name: Daily Job Update

on:
  schedule:
    - cron: "0 11 * * *" # 6 AM EST (11:00 UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run pipeline
        run: npx tsx pipeline/run.ts

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          git diff --staged --quiet || git commit -m "chore: daily job update $(date -u +%Y-%m-%d)"
          git push
